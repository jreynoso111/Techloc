<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechLoc • GPS Blacklist Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../../assets/js/supabaseClient.js"></script>
  <script type="module" src="../../assets/scripts/authManager.js"></script>
  <script type="module" src="../../assets/scripts/admin-auth.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { slate: { 950: '#020617' } },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="../../assets/visuals/theme.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-50" data-page-title="GPS Blacklist" data-active-nav="dashboard">
  <div data-auth-loading class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
    <div class="flex items-center gap-3 rounded-2xl border border-slate-800 bg-slate-900 px-5 py-3 shadow-xl shadow-slate-900/60">
      <span class="h-3 w-3 animate-pulse rounded-full bg-blue-400"></span>
      <p class="text-sm font-semibold text-slate-200">Validando sesión segura…</p>
    </div>
  </div>

  <div data-auth-protected class="hidden">
    <div class="sticky top-0 z-50 space-y-px">
      <div data-shared-header></div>
      <div data-admin-nav data-admin-nav="gps-blacklist"></div>
    </div>

    <canvas id="constellation-canvas" class="pointer-events-none fixed inset-0 -z-10"></canvas>

    <main class="mx-auto w-full max-w-7xl space-y-6 px-6 py-8 lg:px-10">
      <section class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6 shadow-xl shadow-blue-900/20">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-200">Admin only</p>
            <h1 class="text-3xl font-black text-white">GPS Blacklist</h1>
            <p class="mt-2 text-sm text-slate-300">Gestión directa de la tabla <span class="font-semibold text-blue-200">gps_blacklist</span> en Supabase.</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span id="status-pill" class="rounded-full border border-slate-700 bg-slate-900 px-3 py-1 text-[11px] font-semibold uppercase tracking-wide text-slate-300">Cargando…</span>
            <button id="refresh-btn" type="button" class="inline-flex items-center gap-2 rounded-full border border-blue-700/60 bg-blue-600/90 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-white transition hover:bg-blue-500">
              <i data-lucide="refresh-cw" class="h-4 w-4"></i>
              Recargar
            </button>
          </div>
        </div>
      </section>

      <section class="grid gap-4 md:grid-cols-3">
        <article class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
          <p class="text-sm font-semibold text-slate-300">Registros</p>
          <p id="total-count" class="text-3xl font-black text-white">0</p>
        </article>
        <article class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
          <p class="text-sm font-semibold text-slate-300">Columna llave</p>
          <p id="pk-label" class="text-2xl font-black text-blue-300">—</p>
        </article>
        <article class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
          <p class="text-sm font-semibold text-slate-300">Última actualización</p>
          <p id="last-sync" class="text-sm font-semibold text-emerald-300">—</p>
        </article>
      </section>

      <section class="grid gap-4 xl:grid-cols-[2fr,1fr]">
        <article class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/70">
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-800 text-xs" id="blacklist-table">
              <thead class="bg-slate-950/80 text-slate-300">
                <tr id="table-head-row"></tr>
              </thead>
              <tbody id="table-body" class="divide-y divide-slate-800"></tbody>
            </table>
          </div>
        </article>

        <article class="space-y-3 rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
          <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-200">Editor JSON</p>
            <h2 class="text-lg font-bold text-white">Insertar / Actualizar</h2>
            <p class="text-xs text-slate-400">Usa un objeto JSON válido con columnas de <code>gps_blacklist</code>.</p>
          </div>
          <label class="text-xs font-semibold uppercase tracking-wide text-slate-400" for="row-json">Payload</label>
          <textarea id="row-json" rows="14" class="w-full rounded-xl border border-slate-700 bg-slate-950 p-3 font-mono text-xs text-slate-100 focus:border-blue-500 focus:outline-none" spellcheck="false">{
  "serial": "",
  "reason": ""
}</textarea>
          <p id="form-mode" class="text-xs font-semibold text-slate-300">Modo: crear nuevo</p>
          <div class="flex flex-wrap gap-2">
            <button id="save-btn" type="button" class="rounded-lg bg-emerald-600 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-white transition hover:bg-emerald-500">Guardar</button>
            <button id="new-btn" type="button" class="rounded-lg border border-slate-700 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-slate-200 transition hover:border-slate-500">Nuevo</button>
          </div>
          <p id="feedback" class="min-h-5 text-xs text-slate-300"></p>
        </article>
      </section>
    </main>
  </div>

  <script type="module" src="../../assets/scripts/gps-blacklist-admin.js"></script>
  <script type="module" src="../../assets/scripts/sharedHeader.js"></script>
  <script type="module" src="../../assets/scripts/adminNav.js"></script>
</body>
</html>
